<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Unit – لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; }
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-white min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <!-- الهيدر -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold gradient-text">AI-Unit V11</h1>
                <p class="text-gray-400 text-sm">محرك تقييم النماذج الذكي | مجاني وسريع</p>
            </div>
            <div class="flex gap-3">
                <span class="bg-green-500/20 text-green-300 px-3 py-1 rounded-full text-xs border border-green-500/30">مباشر</span>
                <span id="cacheStat" class="bg-blue-500/20 text-blue-300 px-3 py-1 rounded-full text-xs border border-blue-500/30">الكاش: جاهز</span>
            </div>
        </div>

        <!-- نموذج التقييم السريع -->
        <div class="glass-card rounded-2xl p-6 mb-8">
            <h2 class="text-xl font-bold mb-3">📊 تقييم نموذج فوري</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="promptInput" placeholder="اكتب سؤالك هنا..." class="flex-1 bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="evaluatePrompt()" class="bg-blue-600 hover:bg-blue-700 transition px-6 py-3 rounded-xl font-bold whitespace-nowrap">شغّل التقييم</button>
            </div>
            <div id="loading" class="hidden mt-4 text-blue-400">⏳ جارٍ التقييم (مع المحلفين المستقلين)...</div>
        </div>

        <!-- بطاقة النتيجة -->
        <div id="resultCard" class="glass-card rounded-2xl p-6 mb-8 hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-slate-800/50 p-4 rounded-xl text-center">
                    <p class="text-gray-400 text-sm">درجة AIU</p>
                    <p id="aiuScore" class="text-3xl font-bold text-blue-400">0</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl text-center">
                    <p class="text-gray-400 text-sm">الصعوبة (k)</p>
                    <p id="kValue" class="text-3xl font-bold text-purple-400">0</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl text-center">
                    <p class="text-gray-400 text-sm">زمن الاستجابة</p>
                    <p id="timeValue" class="text-3xl font-bold text-emerald-400">0s</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl text-center">
                    <p class="text-gray-400 text-sm">النموذج المختبر</p>
                    <p id="modelName" class="text-sm font-bold text-yellow-400 truncate">...</p>
                </div>
            </div>
            <div>
                <h3 class="font-bold mb-2 text-gray-300">تفاصيل المعايير:</h3>
                <div id="criteriaDetails" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>

        <!-- أرشيف آخر التقييمات من Supabase -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-4">📈 آخر التقييمات المخزنة</h2>
            <div id="historyList" class="space-y-3 max-h-96 overflow-y-auto">
                <p class="text-gray-500 text-center py-4">جاري تحميل التاريخ...</p>
            </div>
        </div>
    </div>

    <script>
        // -------- بيانات Supabase (عدّل المفتاح هنا) --------
        const SUPABASE_URL = 'https://evtgmhhfpggdqxvuhiop.supabase.co';
        // ⚠️ هام: ضع المفتاح العام الكامل (anon key) الذي يبدأ بـ sb_publishable_ 
        const SUPABASE_KEY = 'sb_publishable_v2SDd7kPSYIplkINGC2cxg_dWQMYfXl'; 

        // -------- جلب التاريخ من قاعدة البيانات --------
        async function fetchHistory() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/response_cache?select=prompt_hash,result_json,created_at&order=created_at.desc&limit=10`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await res.json();
                const container = document.getElementById('historyList');
                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">لا توجد تقييمات سابقة.</p>';
                    return;
                }
                container.innerHTML = data.map(item => {
                    const r = item.result_json;
                    return `<div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700/50 flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-400 truncate max-w-xs">${r.model_tested || 'نموذج'}</p>
                            <p class="text-xs text-gray-500">${new Date(item.created_at).toLocaleString('ar-EG')}</p>
                        </div>
                        <div class="flex gap-6">
                            <span class="text-blue-400 font-bold">AIU: ${r.ai_unit_score || 0}</span>
                            <span class="text-purple-400">k: ${r.k || 0}</span>
                            <span class="text-emerald-400">${r.t_actual || 0}s</span>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('historyList').innerHTML = '<p class="text-red-400 text-center py-4">فشل تحميل التاريخ، تأكد من المفتاح.</p>';
                console.error(e);
            }
        }

        // -------- تقييم سؤال جديد عبر API التطبيق --------
        async function evaluatePrompt() {
            const input = document.getElementById('promptInput');
            const prompt = input.value.trim();
            if (!prompt) return alert('يرجى كتابة سؤال');

            const loading = document.getElementById('loading');
            const card = document.getElementById('resultCard');
            loading.classList.remove('hidden');
            card.classList.add('hidden');

            try {
                const res = await fetch('/api/v1/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await res.json();
                loading.classList.add('hidden');

                if (!data.success) {
                    alert('خطأ: ' + (data.error || 'غير معروف'));
                    return;
                }

                // عرض النتائج
                document.getElementById('aiuScore').innerText = data.ai_unit_score || 0;
                document.getElementById('kValue').innerText = data.k || 0;
                document.getElementById('timeValue').innerText = (data.t_actual || 0) + 's';
                document.getElementById('modelName').innerText = data.model_tested || 'N/A';

                const details = document.getElementById('criteriaDetails');
                details.innerHTML = '';
                if (data.criterion_details) {
                    data.criterion_details.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'bg-slate-800/30 p-3 rounded-lg flex justify-between items-center';
                        div.innerHTML = `
                            <span class="text-gray-300">${c.name}</span>
                            <span class="font-bold ${c.score >= 7 ? 'text-emerald-400' : c.score >= 4 ? 'text-yellow-400' : 'text-red-400'}">${c.score}/10</span>
                        `;
                        details.appendChild(div);
                    });
                }
                card.classList.remove('hidden');
                document.getElementById('cacheStat').innerHTML = 'الكاش: ✅ محدث';
                fetchHistory(); // تحديث التاريخ

            } catch (e) {
                loading.classList.add('hidden');
                alert('فشل الاتصال بالخادم: ' + e.message);
            }
        }

        // تحميل التاريخ عند فتح الصفحة
        fetchHistory();

        // السماح بإرسال السؤال بضغط Enter
        document.getElementById('promptInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') evaluatePrompt();
        });
    </script>
</body>
</html>
